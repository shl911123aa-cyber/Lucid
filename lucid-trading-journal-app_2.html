<!DOCTYPE html>
<html lang="zh-TW">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Lucid Trading Journal</title>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
  :root {
    --bg: #f1f5f9; --card: #ffffff; --border: #e2e8f0;
    --text: #0f172a; --text2: #64748b; --text3: #94a3b8;
    --blue: #2563eb; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
    --green-bg: #ecfdf5; --red-bg: #fef2f2; --amber-bg: #fffbeb; --blue-bg: #eff6ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #020617; --card: #0f172a; --border: #1e293b;
      --text: #f1f5f9; --text2: #94a3b8; --text3: #475569;
      --green-bg: #022c22; --red-bg: #2c0a0a; --amber-bg: #2c1e05; --blue-bg: #0a1e3c;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; font-size: 14px;
  }
  .tnum { font-variant-numeric: tabular-nums; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

  header {
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .head-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 12px 0; }
  .head-title { font-size: 18px; font-weight: 600; }
  .head-sub { font-size: 12px; color: var(--text2); }
  .head-stats { display: flex; gap: 16px; }
  .head-stat { text-align: right; }
  .head-stat .lbl { font-size: 12px; color: var(--text2); }
  .head-stat .val { font-size: 18px; font-weight: 600; }

  nav button {
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 8px 12px; font-size: 14px; font-weight: 500; color: var(--text2);
    cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px;

  nav button.active { color: var(--blue); border-bottom-color: var(--blue); }

  .g3 { grid-template-columns: repeat(3, 1fr); }
  .g6 { grid-template-columns: repeat(6, 1fr); }

// 盤口：依進場時間 (UTC+8) 自動推算
// 亞洲 06:00-14:00 / 歐洲 14:00-20:00 / 美盤 20:00-04:00(隔日) / 其餘 盤前
function sessionFromTime(time) {
  if (!time || time.indexOf(':')<0) return '';
  var h = parseInt(time.split(':')[0],10);
  var m = parseInt(time.split(':')[1],10);
  if (isNaN(h)) return '';
  var mins = h*60 + (isNaN(m)?0:m);
  if (mins>=360 && mins<840) return 'asia';     // 06:00-14:00
  if (mins>=840 && mins<1200) return 'europe';  // 14:00-20:00
  if (mins>=1200 || mins<240) return 'us';      // 20:00-04:00
  return 'other';
}
function sessionLabel(s) {
  return {asia:'亞洲盤',europe:'歐洲盤',us:'美盤',other:'其他'}[s] || '—';
}
// 黃金時段判定（你發現的 21:35 後）
function isGoldenTime(time) {
  if (!time || time.indexOf(':')<0) return false;
  var p = time.split(':');
  var mins = parseInt(p[0],10)*60 + parseInt(p[1],10);
  return mins >= (21*60+35) || mins < 240; // 21:35 之後（含跨夜到 04:00）
}
// 時段分桶（4 小時一段）供時間分析
function timeBucket(time) {
  if (!time || time.indexOf(':')<0) return null;
  var h = parseInt(time.split(':')[0],10);
  if (isNaN(h)) return null;
  if (h>=8 && h<12) return '08-12';
  if (h>=12 && h<16) return '12-16';
  if (h>=16 && h<20) return '16-20';
  if (h>=20 && h<24) return '20-24';
  if (h>=0 && h<4) return '00-04';
  if (h>=4 && h<8) return '04-08';
  return null;
}

//=================== 儲存：localStorage 主 + cookie 備援 ===================
function setCookie(name, value, days) {
  var d = new Date(); d.setTime(d.getTime() + days*24*60*60*1000);
  try { document.cookie = name+'='+encodeURIComponent(value)+';expires='+d.toUTCString()+';path=/;SameSite=Lax'; } catch(e){}
}
function getCookie(name) {
  var m = document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');
  return m ? decodeURIComponent(m.pop()) : null;
}
var storageMode = 'unknown';
function lsAvailable() {
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return true; } catch(e){ return false; }
}
function saveData(trades) {
  var json = JSON.stringify(trades);
  var ok = false;
  if (lsAvailable()) {
    try { localStorage.setItem(LS_KEY, json); localStorage.setItem(LS_KEY+'_mtime', new Date().toISOString()); ok = true; storageMode = 'localStorage'; } catch(e){}
  }
  // cookie 存摘要備援（最近 8 筆 + 統計），完整資料靠 localStorage
  var s = calcStats(trades);
  var summary = { n: trades.length, totalR: Math.round(s.totalR*100)/100, bal: Math.round(s.currentBalance), last: trades.slice(-8) };
  var sjson = JSON.stringify(summary);
  if (sjson.length < 3800) setCookie(COOKIE_KEY, sjson, 365);
  if (!ok) storageMode = 'cookie-only';
  return ok;
}
function loadData() {
  if (lsAvailable()) {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) { var p = JSON.parse(raw); if (Array.isArray(p) && p.length) { storageMode='localStorage'; return p; } }
    } catch(e){}
    storageMode = 'localStorage';
  } else {
    storageMode = 'cookie-only';
  }
  return DEFAULT_TRADES.slice();
}

//=================== 統計 ===================
//=================== 截圖儲存（IndexedDB）===================
var IDB_NAME = 'lucid_shots', IDB_STORE = 'images', _idb = null;
function idbOpen() {
  return new Promise(function(resolve, reject){
    if (_idb) return resolve(_idb);
    if (!window.indexedDB) return reject(new Error('此瀏覽器不支援 IndexedDB'));
    var req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = function(e){ var db=e.target.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); };
    req.onsuccess = function(e){ _idb=e.target.result; resolve(_idb); };
    req.onerror = function(){ reject(req.error); };
  });
}
function idbPut(id, dataUrl) {
  return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).put(dataUrl,id);
    tx.oncomplete=function(){res(id);}; tx.onerror=function(){rej(tx.error);};
  });});
}
function idbGet(id) {
  return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction(IDB_STORE,'readonly'); var r=tx.objectStore(IDB_STORE).get(id);
    r.onsuccess=function(){res(r.result||null);}; r.onerror=function(){rej(r.error);};
  });});
}
function idbDel(id) {
  return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction(IDB_STORE,'readwrite'); tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete=function(){res();}; tx.onerror=function(){rej(tx.error);};
  });});
}

    reader.onload=function(e){

      img.onload=function(){
        var w=img.width, h=img.height;
        if (w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if (h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        var ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,w,h);
        try { resolve(cv.toDataURL('image/jpeg', quality)); }
        catch(err){ reject(err); }
      };
      img.onerror=function(){ reject(new Error('圖片讀取失敗')); };
      img.src=e.target.result;
    };
    reader.onerror=function(){ reject(new Error('檔案讀取失敗')); };
    reader.readAsDataURL(file);
  });
}

function sortTrades(t) {
  return t.slice().sort(function(a,b){ if(a.date!==b.date) return a.date<b.date?-1:1; return a.seq-b.seq; });
}
function calcStats(trades) {
  if (!trades.length) return {totalR:0,winRate:0,avgWin:0,avgLoss:0,payoff:0,expectancy:0,breakEvenWR:0,maxDD:0,maxLossStreak:0,maxWinStreak:0,winCount:0,lossCount:0,totalTrades:0,currentBalance:START_BALANCE,peakBalance:START_BALANCE,troughBalance:START_BALANCE};
  var s = sortTrades(trades);
  var totalR = s.reduce(function(a,t){return a+t.r;},0);
  var wins = s.filter(function(t){return t.r>0;});
  var losses = s.filter(function(t){return t.r<0;});
  var winRate = wins.length/s.length;
  var avgWin = wins.length ? wins.reduce(function(a,t){return a+t.r;},0)/wins.length : 0;
  var avgLoss = losses.length ? losses.reduce(function(a,t){return a+t.r;},0)/losses.length : 0;
  var payoff = Math.abs(avgLoss)>0 ? avgWin/Math.abs(avgLoss) : 0;
  var expectancy = totalR/s.length;
  var breakEvenWR = payoff>0 ? 1/(1+payoff) : 0;
  var peak=START_BALANCE, maxDD=0, trough=START_BALANCE;
  s.forEach(function(t){ if(t.balance>peak)peak=t.balance; if(t.balance<trough)trough=t.balance; var dd=(peak-t.balance)/R_UNIT; if(dd>maxDD)maxDD=dd; });
  var cls=0,mls=0,cws=0,mws=0;
  s.forEach(function(t){ if(t.r<0){cls++;cws=0;if(cls>mls)mls=cls;} else if(t.r>0){cws++;cls=0;if(cws>mws)mws=cws;} });
  return {totalR:totalR,winRate:winRate,avgWin:avgWin,avgLoss:avgLoss,payoff:payoff,expectancy:expectancy,breakEvenWR:breakEvenWR,maxDD:maxDD,maxLossStreak:mls,maxWinStreak:mws,winCount:wins.length,lossCount:losses.length,totalTrades:s.length,currentBalance:s[s.length-1].balance,peakBalance:peak,troughBalance:trough};
}
function groupByDate(trades) {
  var s = sortTrades(trades), g = {}, order = [];
  s.forEach(function(t){ if(!g[t.date]){g[t.date]={date:t.date,trades:[],totalR:0};order.push(t.date);} g[t.date].trades.push(t); g[t.date].totalR+=t.r; });
  return order.map(function(d){return g[d];});
}
// 餘額為準：每筆的 balance 是真實值，R 由「本筆餘額 - 前一筆餘額」推算
function recalc(trades) {
  var s = sortTrades(trades), prev = START_BALANCE;
  return s.map(function(t){
    var c={}; for(var k in t)c[k]=t[k];
    var bal = (typeof t.balance==='number' && !isNaN(t.balance)) ? t.balance : prev;
    c.balance = Math.round(bal*100)/100;
    c.r = Math.round(((c.balance - prev)/R_UNIT)*100)/100;
    prev = c.balance;
    return c;
  });
}
function fmtR(r){ return (r>=0?'+':'')+r.toFixed(2)+'R'; }
function fmtU(u){ return (u>=0?'+':'')+Math.round(u).toLocaleString()+'U'; }
function fmtP(p){ return (p*100).toFixed(1)+'%'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

//=================== SVG 折線圖 ===================
function lineChart(data, w, h) {
  if (!data.length) return '';
  var pad = {t:10,r:50,b:24,l:48};
  var iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  var vals = data.map(function(d){return d.balance;});
  var min = Math.min.apply(null, vals)-200, max = Math.max.apply(null, vals)+200;
  var targetY = START_BALANCE + TARGET_R*R_UNIT;
  max = Math.max(max, targetY+100);
  var rng = max-min || 1;
  function x(i){ return pad.l + (data.length>1 ? i/(data.length-1)*iw : iw/2); }
  function y(v){ return pad.t + (1-(v-min)/rng)*ih; }
  var pts = data.map(function(d,i){return x(i)+','+y(d.balance);}).join(' ');
  var area = pad.l+','+(pad.t+ih)+' '+pts+' '+(pad.l+iw)+','+(pad.t+ih);
  var startY = y(START_BALANCE), tY = y(targetY);
  var svg = '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block">';
  // y grid
  for (var gi=0; gi<=4; gi++){
    var gv = min + rng*gi/4, gy = y(gv);
    svg += '<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+iw)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="1"/>';
    svg += '<text x="'+(pad.l-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="10" fill="var(--text3)">'+Math.round(gv).toLocaleString()+'</text>';
  }
  // start line
  svg += '<line x1="'+pad.l+'" y1="'+startY+'" x2="'+(pad.l+iw)+'" y2="'+startY+'" stroke="var(--text3)" stroke-width="1" stroke-dasharray="3 3"/>';
  // target line
  svg += '<line x1="'+pad.l+'" y1="'+tY+'" x2="'+(pad.l+iw)+'" y2="'+tY+'" stroke="var(--green)" stroke-width="1" stroke-dasharray="3 3"/>';
  svg += '<text x="'+(pad.l+iw)+'" y="'+(tY-4)+'" text-anchor="end" font-size="10" fill="var(--green)">目標 +15R</text>';
  // area + line
  svg += '<polygon points="'+area+'" fill="var(--blue)" opacity="0.08"/>';
  svg += '<polyline points="'+pts+'" fill="none" stroke="var(--blue)" stroke-width="2"/>';
  // x labels (sparse)
  var step = Math.max(1, Math.ceil(data.length/10));
  data.forEach(function(d,i){
    if (i%step===0 || i===data.length-1){
      svg += '<text x="'+x(i)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="var(--text3)">'+d.label+'</text>';
    }
  });
  // last point dot
  var li = data.length-1;
  svg += '<circle cx="'+x(li)+'" cy="'+y(data[li].balance)+'" r="3" fill="var(--blue)"/>';
  svg += '</svg>';
  return svg;
}

//=================== SVG 長條圖 ===================
function barChart(data, w, h) {
  if (!data.length) return '';
  var pad = {t:10,r:10,b:30,l:40};
  var iw = w-pad.l-pad.r, ih = h-pad.t-pad.b;
  var vals = data.map(function(d){return d.totalR;});
  var max = Math.max.apply(null, vals.concat([0.5])), min = Math.min.apply(null, vals.concat([-0.5]));
  var rng = max-min || 1;
  function y(v){ return pad.t + (1-(v-min)/rng)*ih; }
  var zeroY = y(0);
  var bw = iw/data.length*0.7, gap = iw/data.length*0.3;
  var svg = '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block">';
  // y grid
  for (var gi=0; gi<=4; gi++){
    var gv = min + rng*gi/4, gy = y(gv);
    svg += '<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+iw)+'" y2="'+gy+'" stroke="var(--border)" stroke-width="1"/>';
    svg += '<text x="'+(pad.l-6)+'" y="'+(gy+3)+'" text-anchor="end" font-size="10" fill="var(--text3)">'+gv.toFixed(1)+'R</text>';
  }
  svg += '<line x1="'+pad.l+'" y1="'+zeroY+'" x2="'+(pad.l+iw)+'" y2="'+zeroY+'" stroke="var(--text3)" stroke-width="1"/>';
  data.forEach(function(d,i){
    var bx = pad.l + i*(iw/data.length) + gap/2;
    var by = d.totalR>=0 ? y(d.totalR) : zeroY;
    var bh = Math.abs(y(d.totalR)-zeroY);
    var col = d.totalR>=0 ? 'var(--green)' : 'var(--red)';
    svg += '<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" rx="2" fill="'+col+'"><title>'+d.date+' '+fmtR(d.totalR)+' ('+d.count+'筆)</title></rect>';
    if (i % Math.max(1,Math.ceil(data.length/12)) === 0)
      svg += '<text x="'+(bx+bw/2)+'" y="'+(h-8)+'" text-anchor="middle" font-size="9" fill="var(--text3)">'+d.date+'</text>';
  });
  svg += '</svg>';
  return svg;
}

// 為每筆交易標記是否「紀律違規」：當日第 6 筆起、或當日連虧達 3 筆後的交易
function annotateViolations(trades) {
  var s = sortTrades(trades);
  var byDate = {};
  s.forEach(function(t){ if(!byDate[t.date])byDate[t.date]=[]; byDate[t.date].push(t); });
  var out = {};
  for (var d in byDate) {
    var arr = byDate[d], lossStreak = 0;
    arr.forEach(function(t, i){
      var reasons = [];
      if (i >= 5) reasons.push('單日第'+(i+1)+'筆');
      if (lossStreak >= 3) reasons.push('連虧'+lossStreak+'後續做');
      out[t.date+'#'+t.seq] = reasons;
      if (t.r < 0) lossStreak++; else if (t.r > 0) lossStreak = 0;
    });
  }
  return out;
}
function tradeKey(t){ return t.date+'#'+t.seq; }

  html += '</div>';

  return html;

  return '<div class="lightbox-overlay" onclick="closeLightbox()"><img id="lightbox-img" alt="放大截圖" onclick="event.stopPropagation()"><button class="lightbox-close" onclick="closeLightbox()">×</button></div>';
}
// 把一筆交易的標籤渲染成小 pill
function tradeTagsHtml(x, violReasons) {
  var parts = [];
  if (x.direction) parts.push('<span class="tg">'+taxLabel('direction',x.direction)+'</span>');
  if (x.symbol) parts.push('<span class="tg">'+taxLabel('symbol',x.symbol)+'</span>');
  var sess = sessionFromTime(x.time);
  if (sess) parts.push('<span class="tg">'+sessionLabel(sess)+'</span>');
  if (x.setup) parts.push('<span class="tg tg-blue">'+taxLabel('setup',x.setup)+'</span>');
  if (x.news && x.news!=='none') parts.push('<span class="tg">'+taxLabel('news',x.news)+'</span>');
  if (x.emotion) parts.push('<span class="tg">'+taxLabel('emotion',x.emotion)+'</span>');
  if (violReasons && violReasons.length) parts.push('<span class="tg tg-red" title="'+violReasons.join('、')+'">⚠ 違規</span>');
  return parts.join(' ');
}

// 標籤選擇器：一組 pill 按鈕（單選），點了再點可取消
function tagGroup(field) {
  var def = TAX[field];
  var cur = state.form[field] || '';
  var html = '<div style="margin-bottom:14px"><div class="l" style="margin-bottom:6px">'+def.label+'</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
  def.opts.forEach(function(o){
    var on = cur===o[0];
    html += '<button type="button" class="tagbtn'+(on?' on':'')+'" onclick="pickTag(\''+field+'\',\''+o[0]+'\')">'+o[1]+'</button>';
  });
  html += '</div></div>';
  return html;
}
function pickTag(field, val) {
  captureForm();
  state.form[field] = (state.form[field]===val) ? '' : val;
  render();
}
function setFormDate(which) {
  captureForm();
  var d = new Date();
  if (which==='yesterday') d.setDate(d.getDate()-1);
  state.form.date = d.toISOString().slice(0,10);
  render();
}

// 算出「這筆的前一筆餘額」：編輯時=被編輯筆的前一筆；新增時=該日期最後一筆(或更早日期最後一筆)
function prevBalanceForForm() {
  var sorted = sortTrades(state.trades);
  if (state.editKey) {
    var idx = -1;
    for (var i=0;i<sorted.length;i++){ if(tradeKey(sorted[i])===state.editKey){ idx=i; break; } }
    if (idx<=0) return START_BALANCE;
    return sorted[idx-1].balance;
  }
  // 新增：找出 <= 選定日期的最後一筆
  var d = state.form.date;
  var prev = START_BALANCE;
  for (var j=0;j<sorted.length;j++){ if(sorted[j].date<=d) prev=sorted[j].balance; else break; }
  return prev;
}
function setBal(v) { captureForm(); state.form.bal = String(v); render(); }
function onBalInput() {
  // 即時更新 live-r 文字，不整頁重繪（避免輸入時失焦）
  var el = document.getElementById('f-bal'); if(!el) return;
  state.form.bal = el.value;
  var prevBal = prevBalanceForForm();
  var box = document.getElementById('live-r');
  if (!box) return;
  var v = parseFloat(el.value);
  if (el.value==='' || isNaN(v)) { box.style.color='var(--text3)'; box.innerHTML='輸入餘額後自動計算這筆 R'; return; }
  var r = (v - prevBal)/R_UNIT;
  box.style.color = r>=0 ? 'var(--green)' : 'var(--red)';
  box.innerHTML = '這筆 = <b>'+(r>=0?'+':'')+r.toFixed(2)+'R</b>（餘額變化 '+(r>=0?'+':'')+Math.round(v-prevBal).toLocaleString()+'U）';
}

function viewAdd() {
  var f = state.form, t = state.trades;
  var isEdit = !!state.editKey;
  var todayTrades = t.filter(function(x){return x.date===f.date;});
  var ls = 0;
  for (var i=todayTrades.length-1;i>=0;i--){ if(todayTrades[i].r<0)ls++; else break; }
  var cnt = todayTrades.length;
  var dR = todayTrades.reduce(function(a,x){return a+x.r;},0);
  var sess = sessionFromTime(f.time);
  var golden = isGoldenTime(f.time);

  var html = '<div class="stack">';
  if (!isEdit && (ls>=2 || cnt>=5)) {
    html += '<div class="alert amber"><div>⚠️</div><div><div style="font-weight:500;margin-bottom:4px">建議停手（此筆可能被標記為違規交易）</div><div style="font-size:12px">';
    if (ls>=2) html += '· 今日已連續虧損 '+ls+' 筆，達到停手門檻<br>';
    if (cnt>=5) html += '· 今日已交易 '+cnt+' 筆，達到單日上限';
    html += '</div></div></div>';
  }
  html += '<div class="card"><div class="row" style="margin-bottom:12px"><h3 style="margin:0">'+(isEdit?'編輯交易':'新增交易紀錄')+'</h3>'+(isEdit?'<button class="btn" onclick="cancelEdit()">取消編輯</button>':'')+'</div>';

  // 日期 + 快捷
  html += '<div class="fld" style="margin-bottom:14px"><span class="l">日期</span><div style="display:flex;gap:8px;align-items:center"><input type="date" id="f-date" value="'+f.date+'" style="flex:1" onchange="captureForm();render()"><button type="button" class="btn" onclick="setFormDate(\'today\')">今天</button><button type="button" class="btn" onclick="setFormDate(\'yesterday\')">昨天</button></div></div>';

  // 時間 + 盤口預覽
  html += '<div class="fld" style="margin-bottom:14px"><span class="l">進場時間（UTC+8，選填）</span><input type="time" id="f-time" value="'+f.time+'" onchange="captureForm();render()"></div>';
  if (f.time) {
    html += '<div style="margin:-6px 0 14px;font-size:12px;color:var(--text2)">自動歸類盤口：<b>'+sessionLabel(sess)+'</b>'+(golden?' · <span class="green">✓ 21:35 後黃金時段</span>':'')+'</div>';
  }

  // 餘額輸入（R 自動由餘額差推算）+ 快速調整按鈕
  var prevBal = prevBalanceForForm();
  html += '<div class="fld" style="margin-bottom:6px"><span class="l">當前餘額 (U) *　<span style="color:var(--text3);font-weight:400">前一筆餘額 '+Math.round(prevBal).toLocaleString()+'U</span></span><input type="number" step="0.01" id="f-bal" value="'+(f.bal!==''&&f.bal!=null?f.bal:'')+'" placeholder="例如：'+Math.round(prevBal+R_UNIT)+'（賺1R）或 '+Math.round(prevBal-R_UNIT)+'（虧1R）" inputmode="decimal" oninput="onBalInput()"></div>';
  // 即時 R 顯示
  var liveR = (f.bal!==''&&f.bal!=null&&!isNaN(parseFloat(f.bal))) ? (parseFloat(f.bal)-prevBal)/R_UNIT : null;
  html += '<div id="live-r" style="margin-bottom:10px;font-size:13px;'+(liveR===null?'color:var(--text3)':(liveR>=0?'color:var(--green)':'color:var(--red)'))+'">'+(liveR===null?'輸入餘額後自動計算這筆 R':'這筆 = <b>'+(liveR>=0?'+':'')+liveR.toFixed(2)+'R</b>（餘額變化 '+(liveR>=0?'+':'')+Math.round(parseFloat(f.bal)-prevBal).toLocaleString()+'U）')+'</div>';
  // 快速填入：以前一筆餘額為基準 +/- 整數 R
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">';
  [['-1','-1R'],['-0.5','-0.5R'],['1','+1R'],['2','+2R'],['3','+3R']].forEach(function(q){
    var tgt = Math.round((prevBal + parseFloat(q[0])*R_UNIT)*100)/100;
    html += '<button type="button" class="tagbtn" onclick="setBal('+tgt+')">'+q[1]+'</button>';
  });
  html += '<span style="font-size:12px;color:var(--text3);align-self:center;margin-left:4px">1R='+R_UNIT+'U</span>';
  html += '</div>';

  // 標籤
  html += tagGroup('direction');
  html += tagGroup('symbol');
  html += tagGroup('setup');
  html += tagGroup('news');
  html += tagGroup('emotion');

  html += '<label class="fld" style="margin-bottom:16px"><span class="l">備註（選填）</span><textarea id="f-notes" rows="2" placeholder="例如：100EMA 阻力做空 / 利率會議掃損...">'+esc(f.notes)+'</textarea></label>';

  // 截圖上傳區
  html += '<div class="fld" style="margin-bottom:16px"><span class="l">進場截圖（可多張：進場 / 出場 / 不同時間框架）</span>';
  html += '<div id="shot-strip" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">'+formShotsHtml()+'</div>';
  html += '<label class="droparea" id="drop-area"><input type="file" id="shot-input" accept="image/*" multiple style="display:none" onchange="onShotPick(event)"><div style="pointer-events:none">📷 點此選擇圖片，或把圖片拖曳到這裡<div style="font-size:11px;color:var(--text3);margin-top:4px">自動壓縮，存在本機 IndexedDB</div></div></label>';
  html += '</div>';

  html += '<button class="btn primary" onclick="doAdd()">'+(isEdit?'儲存修改':'+ 新增交易')+'</button>';
  html += '</div>';

  if (!isEdit && todayTrades.length) {
    html += '<div class="card"><div class="stat-lbl">'+f.date+' 今日狀態</div><div class="grid g3" style="margin-top:8px">';
    html += '<div><div class="muted" style="font-size:12px">筆數</div><div style="font-size:16px;font-weight:500">'+cnt+' / 5</div></div>';
    html += '<div><div class="muted" style="font-size:12px">當日盈虧</div><div style="font-size:16px;font-weight:500" class="'+(dR>=0?'green':'red')+'">'+fmtR(dR)+'</div></div>';
    html += '<div><div class="muted" style="font-size:12px">當前連敗</div><div style="font-size:16px;font-weight:500" class="'+(ls>=2?'red':'')+'">'+ls+'</div></div>';
    html += '</div></div>';
  }
  html += '</div>';
  return html;
}

// 表單目前已選截圖的縮圖（縮圖內容由 idb 非同步載入）
function formShotsHtml() {
  var ids = state.form.shots || [];
  if (!ids.length) return '<span style="font-size:12px;color:var(--text3)">尚未加入截圖</span>';
  return ids.map(function(id){
    return '<div class="shot-thumb" data-shot="'+id+'"><img id="thumb-'+id+'" alt="截圖"><button type="button" class="shot-del" title="移除" onclick="removeFormShot(\''+id+'\')">×</button></div>';
  }).join('');
}
// 載入所有縮圖到 <img>（render 後呼叫）
function hydrateThumbs() {
  var imgs = document.querySelectorAll('img[id^="thumb-"]');
  imgs.forEach(function(el){
    var id = el.id.replace('thumb-','');
    idbGet(id).then(function(d){ if(d) el.src=d; }).catch(function(){});
  });
  // 明細燈箱大圖
  var lb = document.getElementById('lightbox-img');
  if (lb && state.lightbox) idbGet(state.lightbox.id).then(function(d){ if(d) lb.src=d; });
}
function onShotPick(ev) {
  var files = ev.target.files;
  if (!files || !files.length) return;
  captureForm();
  processShotFiles(files);
  ev.target.value='';
}
function processShotFiles(files) {
  var arr = Array.prototype.slice.call(files).filter(function(f){return f.type.indexOf('image/')===0;});
  if (!arr.length) return;
  var queue = arr.map(function(file){
    var id = newShotId();
    return compressImage(file, 1600, 0.82)
      .then(function(dataUrl){ return idbPut(id, dataUrl); })
      .then(function(){ state.form.shots.push(id); })
      .catch(function(err){ console.warn('截圖處理失敗', err); });
  });
  Promise.all(queue).then(function(){ render(); });
}
function removeFormShot(id) {
  captureForm();
  state.form.shots = (state.form.shots||[]).filter(function(x){return x!==id;});
  idbDel(id); // 從 IndexedDB 一併刪除（尚未綁到交易，安全）
  render();
}
// 明細彈窗
function openDetail(date, seq) { state.detailKey = date+'#'+seq; render(); }
function closeDetail(ev) { if(ev && ev.target && !ev.target.classList.contains('modal-overlay')) return; state.detailKey=null; render(); }
function onDetailShotPick(ev) {
  var files = ev.target.files; if(!files||!files.length) return;
  var key = state.detailKey;
  var arr = Array.prototype.slice.call(files).filter(function(f){return f.type.indexOf('image/')===0;});
  var newIds = [];
  Promise.all(arr.map(function(file){
    var id=newShotId();
    return compressImage(file,1600,0.82).then(function(d){return idbPut(id,d);}).then(function(){newIds.push(id);}).catch(function(e){console.warn(e);});
  })).then(function(){
    var updated = state.trades.map(function(x){
      if (tradeKey(x)===key){ var c={};for(var k in x)c[k]=x[k]; c.shots=(c.shots||[]).concat(newIds); return c; }
      return x;
    });
    commitTrades(updated);
  });
  ev.target.value='';
}
function deleteDetailShot(key, id) {
  if(!confirm('刪除這張截圖？')) return;
  idbDel(id);
  var updated = state.trades.map(function(x){
    if (tradeKey(x)===key){ var c={};for(var k in x)c[k]=x[k]; c.shots=(c.shots||[]).filter(function(s){return s!==id;}); return c; }
    return x;
  });
  commitTrades(updated);
}
// 燈箱
function openLightbox(id, idx) { state.lightbox={id:id,idx:idx}; render(); }
function closeLightbox() { state.lightbox=null; render(); }

// 依某個維度分組統計，回傳排序後的列：{key,label,n,winRate,avgR,totalR}
function breakdownBy(trades, keyFn, labelFn) {
  var groups = {};
  trades.forEach(function(t){
    var k = keyFn(t);
    if (k===null || k===undefined || k==='') return;
    if (!groups[k]) groups[k] = { key:k, n:0, wins:0, totalR:0 };
    groups[k].n++; groups[k].totalR += t.r; if (t.r>0) groups[k].wins++;
  });
  var rows = [];
  for (var k in groups) {
    var g = groups[k];
    rows.push({ key:k, label: labelFn(k), n:g.n, winRate:g.wins/g.n, avgR:g.totalR/g.n, totalR:g.totalR });
  }
  rows.sort(function(a,b){ return b.avgR - a.avgR; });
  return rows;
}
// 把分組結果畫成表格（含勝率、平均R、總R、筆數），平均R 用顏色標示
function breakdownTable(rows, firstColLabel) {
  if (!rows.length) return '<p style="font-size:12px;color:var(--text3)">尚無足夠標籤資料（在「新增/編輯」幫交易加標籤後就會出現）</p>';
  var html = '<div style="overflow-x:auto"><table><thead><tr><th>'+firstColLabel+'</th><th class="r">筆數</th><th class="r">勝率</th><th class="r">平均R</th><th class="r">總R</th></tr></thead><tbody>';
  rows.forEach(function(r){
    var rc = r.avgR>0?'green':(r.avgR<0?'red':'');
    html += '<tr><td style="font-weight:500">'+esc(r.label)+'</td><td class="r tnum muted">'+r.n+'</td><td class="r tnum">'+fmtP(r.winRate)+'</td><td class="r tnum '+rc+'" style="font-weight:600">'+fmtR(r.avgR)+'</td><td class="r tnum '+(r.totalR>0?'green':(r.totalR<0?'red':''))+'">'+fmtR(r.totalR)+'</td></tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function viewAnalysis() {
  var t = state.trades, s = calcStats(t);
  if (!t.length) return emptyState('尚無資料可分析。');
  var sorted = sortTrades(t);

  var violationDays = groupByDate(t).filter(function(d){
    if (d.trades.length>=6) return true;
    var ms=0,c=0; d.trades.forEach(function(x){ if(x.r<0){c++;if(c>ms)ms=c;}else c=0; }); return ms>=3;
  });
  var vset = {}; violationDays.forEach(function(d){vset[d.date]=1;});
  var cleanStats = calcStats(sorted.filter(function(x){return !vset[x.date];}));

  // 連虧後勝率
  var buckets = {'0':{c:0,w:0},'1':{c:0,w:0},'2':{c:0,w:0},'3':{c:0,w:0},'4+':{c:0,w:0}};
  var streak=0;
  sorted.forEach(function(x){ var b=streak>=4?'4+':String(streak); buckets[b].c++; if(x.r>0)buckets[b].w++; if(x.r<0)streak++; else if(x.r>0)streak=0; });

  var bigWins = sorted.filter(function(x){return x.r>=2;});
  var bigLosses = sorted.filter(function(x){return x.r<=-1.2;});

  var html = '<div class="stack">';
  // 違規日
  html += '<div class="card"><h3>⚠ 違規日對比分析</h3><p style="font-size:12px;color:var(--text2);margin-bottom:12px">排除「單日 6+ 筆」或「當日連虧 3+ 筆」的交易日</p>';
  html += '<div class="grid g2">';
  html += '<div style="padding:12px;background:var(--bg);border-radius:6px"><div style="font-size:12px;color:var(--text2)">原始（含違規日）</div><div class="stat-val '+(s.totalR>0?'green':'red')+'" style="margin-top:4px">'+fmtR(s.totalR)+'</div><div style="font-size:12px;color:var(--text2);margin-top:4px">期望值 '+fmtR(s.expectancy)+' / 筆</div></div>';
  html += '<div style="padding:12px;background:var(--green-bg);border-radius:6px;border:1px solid var(--green)"><div style="font-size:12px" class="green">排除違規日後</div><div class="stat-val '+(cleanStats.totalR>0?'green':'red')+'" style="margin-top:4px">'+fmtR(cleanStats.totalR)+'</div><div style="font-size:12px;margin-top:4px" class="green">期望值 '+fmtR(cleanStats.expectancy)+' / 筆</div></div>';
  html += '</div>';
  if (violationDays.length) {
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:12px;color:var(--text2);margin-bottom:8px">違規日清單：</div>';
    violationDays.forEach(function(d){
      html += '<div class="row" style="background:var(--red-bg);border-radius:4px;padding:6px 12px;margin-bottom:6px"><span style="font-weight:500">'+d.date+'</span><span class="muted" style="font-size:12px">'+d.trades.length+' 筆</span><span class="tnum '+(d.totalR>=0?'green':'red')+'" style="font-weight:500">'+fmtR(d.totalR)+'</span></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // ===== 標籤績效分析（核心：靠什麼在賺錢）=====
  var setupRows = breakdownBy(sorted, function(t){return t.setup;}, function(k){return taxLabel('setup',k);});
  var sessionRows = breakdownBy(sorted, function(t){return sessionFromTime(t.time);}, function(k){return sessionLabel(k);});
  var timeRows = breakdownBy(sorted, function(t){return timeBucket(t.time);}, function(k){return k;});
  timeRows.sort(function(a,b){ return a.key<b.key?-1:1; });
  var emotionRows = breakdownBy(sorted, function(t){return t.emotion;}, function(k){return taxLabel('emotion',k);});
  var symbolRows = breakdownBy(sorted, function(t){return t.symbol;}, function(k){return taxLabel('symbol',k);});
  var dirRows = breakdownBy(sorted, function(t){return t.direction;}, function(k){return taxLabel('direction',k);});
  var taggedCount = sorted.filter(function(t){return t.setup||t.direction||t.symbol||t.emotion;}).length;

  html += '<div class="card"><h3>🎯 Setup 績效（你到底靠什麼在賺錢）</h3><p style="font-size:12px;color:var(--text2);margin-bottom:12px">依平均 R 排序。把虧損的 Setup 砍掉、加碼賺錢的 Setup，是提升期望值最快的路。</p>'+breakdownTable(setupRows,'Setup')+'</div>';
  html += '<div class="grid g2">';
  html += '<div class="card"><h3>⏰ 時段績效</h3><p style="font-size:12px;color:var(--text2);margin-bottom:10px">驗證你的「21:35 後較好」假設</p>'+breakdownTable(timeRows,'時段(UTC+8)')+'</div>';
  html += '<div class="card"><h3>🌏 盤口績效</h3><p style="font-size:12px;color:var(--text2);margin-bottom:10px">依進場時間自動歸類</p>'+breakdownTable(sessionRows,'盤口')+'</div>';
  html += '</div>';
  html += '<div class="card"><h3>😊 情緒績效</h3><p style="font-size:12px;color:var(--text2);margin-bottom:12px">很多人最後發現：不是策略有問題，是情緒有問題。</p>'+breakdownTable(emotionRows,'情緒')+'</div>';
  html += '<div class="grid g2">';
  html += '<div class="card"><h3>方向績效</h3>'+breakdownTable(dirRows,'方向')+'</div>';
  html += '<div class="card"><h3>商品績效</h3>'+breakdownTable(symbolRows,'商品')+'</div>';
  html += '</div>';
  if (taggedCount < sorted.length) {
    html += '<div class="card" style="background:var(--amber-bg);border:none"><div style="font-size:12px;color:var(--text2)">📌 目前 '+sorted.length+' 筆中有 '+(sorted.length-taggedCount)+' 筆尚未加標籤（預設歷史資料沒標籤）。新增或編輯交易時補上標籤，表格會越來越準。</div></div>';
  }

  // ===== 違規交易逐筆對比 =====
  var vmap = annotateViolations(t);
  var normalT = [], violT = [];
  sorted.forEach(function(x){ if ((vmap[tradeKey(x)]||[]).length) violT.push(x); else normalT.push(x); });
  var nStat = calcStats(normalT), vStat = calcStats(violT);
  html += '<div class="card"><h3>🚦 違規交易 vs 正常交易（逐筆）</h3><p style="font-size:12px;color:var(--text2);margin-bottom:12px">違規＝單日第 6 筆起、或當日連虧 3 筆後仍續做。</p>';
  html += '<div class="grid g2">';
  html += '<div style="padding:12px;background:var(--green-bg);border-radius:6px;border:1px solid var(--green)"><div style="font-size:12px" class="green">正常交易 ('+normalT.length+' 筆)</div><div class="stat-val '+(nStat.expectancy>=0?'green':'red')+'" style="margin-top:4px">'+(normalT.length?fmtR(nStat.expectancy):'—')+'<span style="font-size:13px;font-weight:400"> /筆</span></div><div style="font-size:12px;color:var(--text2);margin-top:4px">勝率 '+(normalT.length?fmtP(nStat.winRate):'—')+' · 總 '+fmtR(nStat.totalR)+'</div></div>';
  html += '<div style="padding:12px;background:var(--red-bg);border-radius:6px;border:1px solid var(--red)"><div style="font-size:12px" class="red">違規交易 ('+violT.length+' 筆)</div><div class="stat-val '+(vStat.expectancy>=0?'green':'red')+'" style="margin-top:4px">'+(violT.length?fmtR(vStat.expectancy):'—')+'<span style="font-size:13px;font-weight:400"> /筆</span></div><div style="font-size:12px;color:var(--text2);margin-top:4px">勝率 '+(violT.length?fmtP(vStat.winRate):'—')+' · 總 '+fmtR(vStat.totalR)+'</div></div>';
  html += '</div>';
  if (violT.length && normalT.length) {
    var diff = nStat.expectancy - vStat.expectancy;
    html += '<div style="margin-top:12px;font-size:13px;color:var(--text)">差距：正常交易每筆比違規交易多 <b class="green">'+diff.toFixed(2)+'R</b>，違規交易合計拖累 <b class="red">'+fmtR(vStat.totalR)+'</b>。</div>';
  }
  html += '</div>';

  // 連虧後勝率
  html += '<div class="card"><h3>連虧後勝率分析</h3><p style="font-size:12px;color:var(--text2);margin-bottom:12px">若連虧後勝率持續下降，代表「連虧後停手」是有效規則</p>';
  ['0','1','2','3','4+'].forEach(function(k){
    var v=buckets[k], wr=v.c>0?v.w/v.c:0;
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:90px;font-size:12px;color:var(--text2)">連虧 '+k+' 後</div><div style="flex:1;height:24px;background:var(--bg);border-radius:4px;position:relative;overflow:hidden"><div style="height:100%;background:var(--blue);width:'+(wr*100)+'%"></div><div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;font-size:12px"><span style="font-weight:500">'+(v.c>0?fmtP(wr):'—')+'</span><span class="muted" style="margin-left:auto">'+v.w+'/'+v.c+'</span></div></div></div>';
  });
  html += '</div>';

  // 大贏大虧
  html += '<div class="grid g2">';
  html += '<div class="card"><h3 class="green">大贏（≥ 2R）</h3><div class="stat-val">'+bigWins.length+' 筆</div><div style="font-size:12px;color:var(--text2);margin:8px 0">佔 '+fmtP(bigWins.length/sorted.length)+'，貢獻 '+fmtR(bigWins.reduce(function(a,x){return a+x.r;},0))+'</div><div style="max-height:160px;overflow-y:auto">';
  bigWins.slice().reverse().forEach(function(x){ html += '<div class="row" style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">'+x.date.slice(5)+' #'+x.seq+'</span><span class="green tnum" style="font-weight:500">'+fmtR(x.r)+'</span></div>'; });
  html += '</div></div>';
  html += '<div class="card"><h3 class="red">大虧（≤ -1.2R）</h3><div class="stat-val">'+bigLosses.length+' 筆</div><div style="font-size:12px;color:var(--text2);margin:8px 0">超過標準 1R 停損的次數</div><div style="max-height:160px;overflow-y:auto">';
  bigLosses.slice().reverse().forEach(function(x){ html += '<div class="row" style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">'+x.date.slice(5)+' #'+x.seq+'</span><span class="red tnum" style="font-weight:500">'+fmtR(x.r)+'</span></div>'; });
  html += '</div></div>';
  html += '</div>';

  // 達標路徑
  html += '<div class="alert blue"><div style="width:100%"><h3 style="color:var(--blue)">達標路徑試算</h3><div style="font-size:14px;color:var(--text)">';
  html += '<div>還需 <b>'+(TARGET_R-s.totalR).toFixed(2)+'R</b> 達到考試目標</div>';
  if (s.expectancy>0) html += '<div>按目前期望值 '+fmtR(s.expectancy)+'/筆，約需 <b>'+Math.ceil((TARGET_R-s.totalR)/s.expectancy)+'</b> 筆達成</div>';
  else html += '<div>目前期望值為負，需先把勝率提升到 <b>'+fmtP(s.breakEvenWR+0.02)+'</b> 以上</div>';
  if (cleanStats.expectancy>0 && Math.abs(cleanStats.expectancy-s.expectancy)>0.01) html += '<div style="font-size:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">提示：若能避免違規日，期望值會提升到 '+fmtR(cleanStats.expectancy)+'/筆，約 '+Math.ceil((TARGET_R-s.totalR)/cleanStats.expectancy)+' 筆達成</div>';
  html += '</div></div></div>';
  html += '</div>';
  return html;
}

  });

  html += allOn ? '<span class="green" style="font-weight:500">✓ 條件齊全，可以進場</span>' : '<span style="color:var(--text2)">還差 '+nOff+' 項條件</span>';
  html += '</div></div>';

  html += '<div class="card"><h3>紀律硬規則</h3>';

    ['1','連虧 2 筆，當天剩餘時間停手','不是 3 筆。連虧 2 筆通常代表當下行情跟你的系統不對盤'],
    ['2','單日上限 5 筆','第 6 筆機會多好都不做。前幾份紀錄的爆量日都是 6+ 筆'],
    ['3','停損後 30 分鐘內不做同方向','避免重複進場變相加倉'],
    ['4','行情走成單邊趨勢時，不逆勢做回歸','改順勢做破位回測，或休息到明天']

//=================== 操作 ===================
function captureForm() {
  var d=document.getElementById('f-date'), tm=document.getElementById('f-time'), b=document.getElementById('f-bal'), n=document.getElementById('f-notes');
  if(d) state.form.date=d.value;
  if(tm) state.form.time=tm.value;
  if(b) state.form.bal=b.value;
  if(n) state.form.notes=n.value;
}
function doAdd() {
  captureForm();
  var f = state.form;
  var bal = parseFloat(f.bal);
  if (isNaN(bal)) { alert('請輸入有效的餘額數字'); return; }
  bal = Math.round(bal*100)/100;
  var tagFields = { time:f.time, notes:f.notes, shots:(f.shots||[]).slice(),
    direction:f.direction, symbol:f.symbol, setup:f.setup, news:f.news, emotion:f.emotion };

  if (state.editKey) {
    // 編輯：直接更新這筆的 balance；recalc 會重算這筆與後續筆的 R
    var updated = state.trades.map(function(x){
      if (tradeKey(x) === state.editKey) {
        var c = {}; for (var k in x) c[k]=x[k];
        c.balance = bal; for (var k2 in tagFields) c[k2]=tagFields[k2];
        return c;
      }
      return x;
    });
    state.editKey = null;
    state.form = blankForm();
    commitTrades(recalc(updated));
    state.tab = 'trades'; render();
    return;
  }

  // 新增：直接存 balance
  var same = state.trades.filter(function(x){return x.date===f.date;});
  var nt = {date:f.date, seq:same.length+1, balance:bal, r:0};
  for (var k3 in tagFields) nt[k3]=tagFields[k3];
  var updated2 = recalc(state.trades.concat([nt]));
  state.form.bal=''; state.form.notes=''; state.form.time=''; state.form.emotion=''; state.form.shots=[];
  commitTrades(updated2);
}
function startEdit(date, seq) {
  var t = state.trades.filter(function(x){return x.date===date && x.seq===seq;})[0];
  if (!t) return;
  state.editKey = tradeKey(t);
  state.form = { date:t.date, time:t.time||'', bal:String(Math.round(t.balance*100)/100), notes:t.notes||'',
    direction:t.direction||'', symbol:t.symbol||'', setup:t.setup||'', news:t.news||'', emotion:t.emotion||'', shots:(t.shots||[]).slice() };
  state.detailKey = null;
  state.tab = 'add'; render();
}
function copyTrade(date, seq) {
  var t = state.trades.filter(function(x){return x.date===date && x.seq===seq;})[0];
  if (!t) return;
  state.editKey = null;
  state.form = { date: new Date().toISOString().slice(0,10), time:t.time||'', bal:'', notes:'',
    direction:t.direction||'', symbol:t.symbol||'', setup:t.setup||'', news:t.news||'', emotion:'', shots:[] };
  state.tab = 'add'; render();
}
function cancelEdit() { state.editKey = null; state.form = blankForm(); render(); }
function doDelete(date, seq) {
  if (!confirm('確定要刪除這筆交易嗎？（含其截圖）')) return;
  var target = state.trades.filter(function(x){return x.date===date && x.seq===seq;})[0];
  if (target && target.shots) target.shots.forEach(function(id){ idbDel(id); });
  var remaining = state.trades.filter(function(x){return !(x.date===date && x.seq===seq);});
  var g={}, order=[];
  remaining.forEach(function(x){ if(!g[x.date]){g[x.date]=[];order.push(x.date);} g[x.date].push(x); });
  var renum=[];
  order.forEach(function(dt){ g[dt].sort(function(a,b){return a.seq-b.seq;}).forEach(function(x,i){ var c={};for(var k in x)c[k]=x[k]; c.seq=i+1; renum.push(c); }); });
  state.detailKey = null;
  commitTrades(recalc(renum));
}
function doReset() { if(!confirm('確定要還原成預設的 50 筆紀錄嗎？目前的編輯會消失。'))return; commitTrades(DEFAULT_TRADES.slice()); }
function doClear() { if(!confirm('確定要清空所有交易紀錄嗎？這個動作無法復原。'))return; commitTrades([]); }

function buildPayload(images) {
  return { app:'lucid-trading-journal', version:3, exportedAt:new Date().toISOString(),
    lastModified: localStorage.getItem(LS_KEY+'_mtime') || new Date().toISOString(),
    rUnit:R_UNIT, startBalance:START_BALANCE, targetR:TARGET_R, trades:state.trades,
    images: images || {} };
}
// 收集所有截圖 dataURL（供匯出時內嵌，達成跨裝置同步）
function collectImages() {
  var ids = [];
  state.trades.forEach(function(t){ (t.shots||[]).forEach(function(id){ ids.push(id); }); });
  if (!ids.length) return Promise.resolve({});
  var images = {};
  return Promise.all(ids.map(function(id){
    return idbGet(id).then(function(d){ if(d) images[id]=d; }).catch(function(){});
  })).then(function(){ return images; });
}
function doExport() {
  var hasShots = state.trades.some(function(t){return (t.shots||[]).length;});
  collectImages().then(function(images){
    var json = JSON.stringify(buildPayload(images));
    var blob = new Blob([json], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var stamp = new Date().toISOString().slice(0,10);
    a.href = url; a.download = 'lucid-journal-'+stamp+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  });
}
function doCopyClipboard() {
  // 剪貼簿版本不含圖片（避免過大），僅交易資料
  var json = JSON.stringify(buildPayload({}));
  function done(){ alert('已複製交易資料到剪貼簿（'+state.trades.length+' 筆，不含截圖）。\n截圖請改用「匯出」下載 JSON 檔保存。'); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(done, function(){ promptCopy(json); });
  } else { promptCopy(json); }
}
function promptCopy(json) { window.prompt('手動複製以下備份內容（Ctrl/Cmd+C）：', json); }
function doImportClick() { var el = document.getElementById('import-file'); if(el) el.click(); }
function doImportFile(ev) {
  var file = ev.target.files && ev.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      applyPayloadData(JSON.parse(e.target.result), '匯入');
    } catch(err) {
      alert('匯入失敗：'+err.message+'\n請確認選的是本工具匯出的 JSON 檔。');
    }
    ev.target.value='';
  };
  reader.readAsText(file);
}
function toggleCheck(i) { state.checks[i]=!state.checks[i]; render(); }
function resetChecks() { state.checks=[false,false,false,false,false]; render(); }

//=================== 雲端同步（GitHub Gist）===================
// 設計：沿用 buildPayload()（已內含交易 + 截圖），把同一份 JSON 推到「你自己的」私密 Gist。
// Token 只存在本機 localStorage，只需 gist 權限，外洩也只影響你的 gist。
var GIST_TOKEN_KEY = 'lucid_gist_token', GIST_ID_KEY = 'lucid_gist_id', GIST_FILE = 'lucid-journal.json';
function getGistToken(){ try { return localStorage.getItem(GIST_TOKEN_KEY) || ''; } catch(e){ return ''; } }
function getGistId(){ try { return localStorage.getItem(GIST_ID_KEY) || ''; } catch(e){ return ''; } }
function setGistToken(v){ try { v ? localStorage.setItem(GIST_TOKEN_KEY, v) : localStorage.removeItem(GIST_TOKEN_KEY); } catch(e){} }
function setGistId(v){ try { v ? localStorage.setItem(GIST_ID_KEY, v) : localStorage.removeItem(GIST_ID_KEY); } catch(e){} }

// 共用：把一份 payload（檔案匯入或雲端載入皆同格式）套用到 app
function applyPayloadData(data, sourceLabel) {
  var trades = Array.isArray(data) ? data : data.trades;
  if (!Array.isArray(trades)) throw new Error('格式不符');
  var images = (data && data.images) || {};
  var clean = trades.filter(function(t){ return t && typeof t.date==='string' && typeof t.r==='number'; })
    .map(function(t){ return { date:t.date, seq:t.seq||1, time:t.time||'', r:t.r, balance:t.balance||0, notes:t.notes||'',
      direction:t.direction||'', symbol:t.symbol||'', setup:t.setup||'', news:t.news||'', emotion:t.emotion||'', shots: Array.isArray(t.shots)?t.shots:[] }; });
  if (!clean.length) throw new Error('沒有有效的交易資料');
  var g={}, order=[];
  sortTrades(clean).forEach(function(x){ if(!g[x.date]){g[x.date]=[];order.push(x.date);} g[x.date].push(x); });
  var renum=[];
  order.forEach(function(dt){ g[dt].forEach(function(x,i){ var c={};for(var k in x)c[k]=x[k]; c.seq=i+1; renum.push(c); }); });
  var imgCount = Object.keys(images).length;
  if (!confirm('將以'+sourceLabel+'的 '+clean.length+' 筆資料'+(imgCount?'（含 '+imgCount+' 張截圖）':'')+'「取代」目前的 '+state.trades.length+' 筆。確定？\n\n（建議先按「匯出」存一份目前的資料）')) return;
  var imgIds = Object.keys(images);
  Promise.all(imgIds.map(function(id){ return idbPut(id, images[id]).catch(function(){}); })).then(function(){
    commitTrades(recalc(renum));
    alert(sourceLabel+'載入成功，共 '+clean.length+' 筆'+(imgCount?'、'+imgCount+' 張截圖':'')+'。');
  });
}

function cloudSync(direction) { return direction==='up' ? doCloudUpload() : doCloudDownload(); }

// 上傳：collectImages -> buildPayload -> PATCH/POST Gist
function doCloudUpload() {
  var token = getGistToken();
  if (!token) { alert('還沒設定。請先按「⚙️ 雲端設定」貼上 GitHub Token。'); state.cloudOpen=true; render(); return; }
  collectImages().then(function(images){
    var payload = JSON.stringify(buildPayload(images));
    var mb = payload.length/1048576;
    if (mb > 9) { if(!confirm('備份約 '+mb.toFixed(1)+'MB，已接近 Gist 單檔上限（截圖太多）。\n仍要上傳嗎？（建議改用「匯出」存檔，或刪掉部分舊截圖）')) return; }
    var gistId = getGistId();
    var body = JSON.stringify({ description:'Lucid Trading Journal backup', public:false,
      files: (function(){ var f={}; f[GIST_FILE]={content:payload}; return f; })() });
    var url = gistId ? 'https://api.github.com/gists/'+gistId : 'https://api.github.com/gists';
    var method = gistId ? 'PATCH' : 'POST';
    alert('上傳中…（'+state.trades.length+' 筆 / '+mb.toFixed(2)+'MB）按確定後請稍候');
    fetch(url, { method:method, headers:{ 'Authorization':'token '+token, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' }, body:body })
      .then(function(r){ if(r.status===401) throw new Error('Token 無效或過期（401）'); if(r.status===404 && gistId) throw new Error('找不到這個 Gist（404）。可能被刪了，請清空 Gist ID 後重新上傳建立新的'); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data){ if(!gistId && data.id){ setGistId(data.id); } alert('✅ 上傳成功！\nGist ID：'+getGistId()+'\n\n換手機時：開同一個網址 → 雲端設定貼一樣的 Token → 按「⬇️ 雲端載入」。'); render(); })
      .catch(function(e){ alert('❌ 上傳失敗：'+e.message); });
  });
}

// 載入：GET Gist -> 取檔案內容（過大則走 raw_url）-> applyPayloadData
function doCloudDownload() {
  var token = getGistToken(), gistId = getGistId();
  if (!token) { alert('還沒設定 Token。請先按「⚙️ 雲端設定」。'); state.cloudOpen=true; render(); return; }
  if (!gistId) { alert('還沒有 Gist ID。請先在「有資料的那台裝置」按一次「☁️ 上傳」，會自動產生 Gist ID；或在雲端設定手動貼上。'); state.cloudOpen=true; render(); return; }
  fetch('https://api.github.com/gists/'+gistId, { headers:{ 'Authorization':'token '+token, 'Accept':'application/vnd.github+json' } })
    .then(function(r){ if(r.status===401) throw new Error('Token 無效或過期（401）'); if(r.status===404) throw new Error('找不到這個 Gist（404）。確認 Gist ID 是否正確'); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(data){
      var file = data.files && data.files[GIST_FILE];
      if (!file) throw new Error('這個 Gist 裡找不到備份檔（'+GIST_FILE+'）');
      if (file.truncated && file.raw_url) return fetch(file.raw_url).then(function(r){ return r.text(); });
      return file.content;
    })
    .then(function(text){ applyPayloadData(JSON.parse(text), '雲端'); })
    .catch(function(e){ alert('❌ 載入失敗：'+e.message); });
}

  if(gd) setGistId(gd.value.trim());
}
function saveCloudSettings(){ captureCloudFields(); alert('已儲存。Token 與 Gist ID 只存在這台裝置的瀏覽器。'); state.cloudOpen=false; render(); }
function clearCloudSettings(){ if(!confirm('清除這台裝置上儲存的 Token 與 Gist ID？（雲端 Gist 本身不會被刪）')) return; setGistToken(''); setGistId(''); render(); }
function cloudModalHtml(){
  if (!state.cloudOpen) return '';
  var tk = getGistToken(), gd = getGistId();
  var masked = tk ? (tk.slice(0,4)+'••••••••'+tk.slice(-4)) : '';
  var html = '<div class="modal-overlay" onclick="closeCloudSettings(event)"><div class="modal" onclick="event.stopPropagation()">';
  html += '<div class="row" style="margin-bottom:12px"><h3 style="margin:0">☁️ 雲端同步設定</h3><button class="btn" onclick="closeCloudSettings()">關閉</button></div>';
  html += '<div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px">把交易＋截圖同步到你自己的私密 GitHub Gist。Token 只存在這台裝置，建議只給 <b>gist</b> 權限。每台裝置都貼<b>同一組</b> Token 與 Gist ID 即可互通。</div>';
  html += '<label class="fld" style="margin-bottom:12px"><span class="l">GitHub Token（gist 權限）'+(tk?' · 目前：'+masked:'')+'</span><input type="password" id="cloud-token" value="'+esc(tk)+'" placeholder="貼上 ghp_ 開頭的 token" autocomplete="off"></label>';
  html += '<label class="fld" style="margin-bottom:14px"><span class="l">Gist ID（第一次上傳後會自動填入；換裝置時貼上同一個）</span><input type="text" id="cloud-gistid" value="'+esc(gd)+'" placeholder="第一次上傳會自動產生，留空即可"></label>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px"><button class="btn primary" style="flex:1" onclick="saveCloudSettings()">儲存設定</button><button class="btn danger" onclick="clearCloudSettings()">清除</button></div>';
  html += '<div style="font-size:12px;color:var(--text2);line-height:1.8;border-top:1px solid var(--border);padding-top:12px"><b>如何取得 Token：</b><br>1. 開 github.com → 右上頭像 → Settings<br>2. 最左下 Developer settings → Personal access tokens → <b>Tokens (classic)</b><br>3. Generate new token (classic)<br>4. 勾選範圍只勾 <b>gist</b> 這一項<br>5. Generate → 複製 ghp_ 開頭那串貼回上面<br><span style="color:var(--amber)">⚠ Token 等於鑰匙，別貼到公開的地方。只勾 gist 權限，風險最小。</span></div>';
  html += '</div></div>';
  return html;
}

//=================== 渲染 ===================
function render() {
  var s = calcStats(state.trades);
  var tabs = [['dashboard','儀表板'],['trades','明細'],['add','新增'],['analysis','分析'],['checklist','Checklist']];
  var nav = tabs.map(function(t){ return '<button class="'+(state.tab===t[0]?'active':'')+'" onclick="changeTab(\''+t[0]+'\')">'+t[1]+'</button>'; }).join('');

  var body = state.tab==='dashboard'?viewDashboard():state.tab==='trades'?viewTrades():state.tab==='add'?viewAdd():state.tab==='analysis'?viewAnalysis():viewChecklist();

  var modeLabel = storageMode==='localStorage' ? '資料儲存於瀏覽器 localStorage（已含 cookie 摘要備援）' : storageMode==='cookie-only' ? '⚠ 此瀏覽器封鎖了 localStorage，目前僅 cookie 備援（容量有限）' : '資料儲存於本機';

  var html = '<header><div class="wrap"><div class="head-row"><div><div class="head-title">Lucid Trading Journal</div><div class="head-sub">1R = 200U · 目標 +15R · 起始 50,000U</div></div><div class="head-stats"><div class="head-stat"><div class="lbl">當前餘額</div><div class="val tnum">'+Math.round(s.currentBalance).toLocaleString()+'<span style="font-size:12px;color:var(--text2);margin-left:4px">U</span></div></div><div class="head-stat"><div class="lbl">總盈虧</div><div class="val tnum '+(s.totalR>0?'green':(s.totalR<0?'red':''))+'">'+fmtR(s.totalR)+'</div></div></div></div><nav>'+nav+'</nav></div></header>';
  html += '<main><div class="wrap">'+body+'</div></main>';
  var installBtn = window.__canInstall ? ' · <a href="#" onclick="doInstall();return false;" style="color:var(--blue)">安裝為應用程式</a>' : '';
  html += '<footer>'+modeLabel+installBtn+'</footer>';

  document.getElementById('app').innerHTML = html;
  hydrateThumbs();
  setupDropAreas();
}
// 拖曳上傳：表單區與明細區
function setupDropAreas() {
  ['drop-area','detail-drop'].forEach(function(zoneId){
    var zone = document.getElementById(zoneId);
    if (!zone) return;
    zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('dragging'); });
    zone.addEventListener('dragleave', function(){ zone.classList.remove('dragging'); });
    zone.addEventListener('drop', function(e){
      e.preventDefault(); zone.classList.remove('dragging');
      var files = e.dataTransfer && e.dataTransfer.files;
      if (!files || !files.length) return;
      if (zoneId==='drop-area') { captureForm(); processShotFiles(files); }
      else { onDetailShotPick({ target:{ files:files, value:'' } }); }
    });
  });
}
function changeTab(tab) { if(state.tab==='add') captureForm(); state.tab=tab; state.detailKey=null; state.lightbox=null; state.cloudOpen=false; render(); }

//=================== PWA：可安裝為應用程式（需透過網址開啟，file:// 不支援）===================
(function setupPWA(){
  try {
    var manifest = {
      name: 'Lucid Trading Journal', short_name: 'Lucid Journal',
      start_url: '.', display: 'standalone',
      background_color: '#0f172a', theme_color: '#2563eb',
      icons: [{
        src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#2563eb"/><text x="256" y="340" font-size="280" text-anchor="middle" fill="#fff" font-family="sans-serif" font-weight="bold">L</text></svg>'),
        sizes: '512x512', type: 'image/svg+xml', purpose: 'any'
      }]
    };
    var blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
    var link = document.createElement('link');
    link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e){}
})();
var __deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); __deferredPrompt = e; window.__canInstall = true; render(); });
function doInstall(){ if(__deferredPrompt){ __deferredPrompt.prompt(); __deferredPrompt = null; window.__canInstall = false; } }
window.addEventListener('appinstalled', function(){ window.__canInstall = false; render(); });

render();
</script>
